<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>
            Simulador VCT Americas 2026 - Stage 1 (Con Probabilidades)
        </title>
        <style>
            :root {
                --bg-color: #0f1923;
                --card-bg: #1f2326;
                --text-color: #ece8e1;
                --accent-pink: #ff007f;
                --accent-cyan: #00ff96;
                --border-color: #333945;
            }
            body {
                background-color: var(--bg-color);
                color: var(--text-color);
                font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
                margin: 0;
                padding: 30px 20px;
            }
            h1 {
                text-align: center;
                text-transform: uppercase;
                letter-spacing: 2px;
                color: var(--accent-pink);
                margin-bottom: 5px;
            }
            p.subtitle {
                text-align: center;
                color: #8b978f;
                margin-bottom: 40px;
            }
            .container {
                display: flex;
                flex-wrap: wrap;
                gap: 20px;
                justify-content: center;
                margin-bottom: 30px;
                align-items: flex-start;
            }
            .group-section {
                background-color: var(--card-bg);
                border: 1px solid var(--border-color);
                border-radius: 8px;
                padding: 20px;
                flex: 1 1 550px;
                max-width: 750px;
                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            }
            .group-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                border-bottom: 2px solid var(--border-color);
                padding-bottom: 10px;
                margin-bottom: 15px;
            }
            h2 {
                margin: 0;
                text-transform: uppercase;
                letter-spacing: 1px;
            }

            .calc-btn {
                background-color: var(--accent-pink);
                color: white;
                border: none;
                padding: 8px 15px;
                border-radius: 4px;
                cursor: pointer;
                font-weight: bold;
                transition: all 0.2s ease;
            }
            .calc-btn:hover {
                background-color: #d6006b;
                transform: scale(1.05);
            }
            .calc-btn:disabled {
                background-color: #555;
                cursor: not-allowed;
                transform: none;
            }

            table {
                width: 100%;
                border-collapse: collapse;
                font-size: 0.9em;
                margin-bottom: 30px;
            }
            th,
            td {
                padding: 12px 6px;
                text-align: center;
                border-bottom: 1px solid var(--border-color);
            }
            th {
                background-color: rgba(255, 255, 255, 0.03);
                font-weight: 600;
                text-transform: uppercase;
                font-size: 0.75em;
                color: #8b978f;
            }
            .team-name {
                text-align: left;
                font-weight: bold;
            }

            .rank-1 {
                border-left: 3px solid var(--accent-pink);
            }
            .rank-2 {
                border-left: 3px solid var(--accent-cyan);
            }
            .rank-4 {
                border-left: 3px solid #ece8e1;
            }

            .prob-cell {
                font-family: monospace;
                font-size: 1.1em;
                line-height: 1.2;
            }
            .prob-count {
                display: block;
                margin-top: 4px;
                font-size: 0.75em;
                color: #a4a9ad;
                font-weight: normal;
            }
            .prob-high {
                color: var(--accent-cyan);
                font-weight: bold;
            }
            .prob-med {
                color: #f1c40f;
            }
            .prob-low {
                color: #e74c3c;
            }
            .prob-zero {
                color: #555;
            }

            .matches-container h3 {
                font-size: 1.1em;
                color: #8b978f;
                margin-bottom: 15px;
                border-bottom: 1px solid var(--border-color);
                padding-bottom: 5px;
            }
            .matches-list {
                display: flex;
                flex-direction: column;
                gap: 8px;
            }
            .match-row {
                display: flex;
                justify-content: space-between;
                align-items: center;
                background: rgba(0, 0, 0, 0.2);
                padding: 10px 15px;
                border-radius: 5px;
                font-size: 0.9em;
                transition: background 0.2s;
            }
            .match-row:hover {
                background: rgba(255, 255, 255, 0.05);
            }

            .match-info {
                display: flex;
                flex-direction: column;
                gap: 4px;
            }
            .match-date {
                font-size: 0.8em;
                color: #8b978f;
                text-transform: uppercase;
                letter-spacing: 0.5px;
            }
            .match-teams {
                font-weight: 500;
                font-size: 1.05em;
            }

            .match-row select {
                background-color: var(--bg-color);
                color: var(--text-color);
                border: 1px solid var(--border-color);
                padding: 8px;
                border-radius: 4px;
                outline: none;
                cursor: pointer;
                font-weight: bold;
            }
            .kru-highlight {
                color: var(--accent-pink);
                text-shadow: 0 0 5px rgba(255, 0, 127, 0.4);
            }
        </style>
    </head>
    <body>
        <h1>Simulador VCT Americas 2026</h1>
        <p class="subtitle">
            Ingresa resultados y calcula las probabilidades exactas de
            clasificación
        </p>

        <div class="container">
            <div class="group-section">
                <div class="group-header">
                    <h2>Grupo Alpha</h2>
                    <button
                        class="calc-btn"
                        id="btn-alpha"
                        onclick="runProbabilities('alpha')"
                    >
                        Calcular Probabilidades
                    </button>
                </div>
                <table id="alpha-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th style="text-align: left">Equipo</th>
                            <th>W-L</th>
                            <th>Mapas</th>
                            <th
                                title="Probabilidad de quedar 1ro (Bye a Semis)"
                            >
                                1º (Bye)
                            </th>
                            <th
                                title="Probabilidad de quedar 2do o 3ro (Upper)"
                            >
                                2º-3º (Up)
                            </th>
                            <th title="Probabilidad de quedar 4to (Lower)">
                                4º (Low)
                            </th>
                            <th title="Probabilidad de eliminación">OUT</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>

                <div class="matches-container">
                    <h3>Encuentros Restantes (Alpha)</h3>
                    <div id="alpha-matches" class="matches-list"></div>
                </div>
            </div>

            <div class="group-section">
                <div class="group-header">
                    <h2>Grupo Omega</h2>
                    <button
                        class="calc-btn"
                        id="btn-omega"
                        onclick="runProbabilities('omega')"
                    >
                        Calcular Probabilidades
                    </button>
                </div>
                <table id="omega-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th style="text-align: left">Equipo</th>
                            <th>W-L</th>
                            <th>Mapas</th>
                            <th
                                title="Probabilidad de quedar 1ro (Bye a Semis)"
                            >
                                1º (Bye)
                            </th>
                            <th
                                title="Probabilidad de quedar 2do o 3ro (Upper)"
                            >
                                2º-3º (Up)
                            </th>
                            <th title="Probabilidad de quedar 4to (Lower)">
                                4º (Low)
                            </th>
                            <th title="Probabilidad de eliminación">OUT</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>

                <div class="matches-container">
                    <h3>Encuentros Restantes (Omega)</h3>
                    <div id="omega-matches" class="matches-list"></div>
                </div>
            </div>
        </div>

        <script>
            const alphaTeams = [
                "Leviatán",
                "MIBR",
                "LOUD",
                "ENVY",
                "G2 Esports",
                "Cloud9",
            ];
            const omegaTeams = [
                "KRÜ Esports",
                "FURIA",
                "Sentinels",
                "100 Thieves",
                "Evil Geniuses",
                "NRG",
            ];

            // Resultados reales de las Semanas 1 y 2
            const alphaPlayed = [
                { t1: "G2 Esports", t2: "MIBR", s1: 0, s2: 2 },
                { t1: "G2 Esports", t2: "Leviatán", s1: 1, s2: 2 },
                { t1: "MIBR", t2: "LOUD", s1: 2, s2: 0 },
                { t1: "Cloud9", t2: "Leviatán", s1: 0, s2: 2 },
                { t1: "Cloud9", t2: "ENVY", s1: 1, s2: 2 },
                { t1: "ENVY", t2: "LOUD", s1: 1, s2: 2 },
                { t1: "Leviatán", t2: "ENVY", s1: 2, s2: 0 },
            ];

            const omegaPlayed = [
                { t1: "FURIA", t2: "NRG", s1: 2, s2: 0 },
                { t1: "FURIA", t2: "Evil Geniuses", s1: 2, s2: 1 },
                { t1: "NRG", t2: "KRÜ Esports", s1: 0, s2: 2 },
                { t1: "100 Thieves", t2: "Evil Geniuses", s1: 2, s2: 0 },
                { t1: "100 Thieves", t2: "Sentinels", s1: 0, s2: 2 },
                { t1: "Sentinels", t2: "KRÜ Esports", s1: 0, s2: 2 },
            ];

            // Partidos faltantes ordenados cronológicamente por grupo
            const alphaRemaining = [
                {
                    t1: "G2 Esports",
                    t2: "LOUD",
                    date: "Vie 24 Abr",
                    s1: null,
                    s2: null,
                },
                {
                    t1: "MIBR",
                    t2: "Cloud9",
                    date: "Dom 26 Abr",
                    s1: null,
                    s2: null,
                },
                {
                    t1: "MIBR",
                    t2: "Leviatán",
                    date: "Vie 1 May",
                    s1: null,
                    s2: null,
                },
                {
                    t1: "Cloud9",
                    t2: "LOUD",
                    date: "Dom 3 May",
                    s1: null,
                    s2: null,
                },
                {
                    t1: "G2 Esports",
                    t2: "ENVY",
                    date: "Dom 3 May",
                    s1: null,
                    s2: null,
                },
                {
                    t1: "G2 Esports",
                    t2: "Cloud9",
                    date: "Sáb 9 May",
                    s1: null,
                    s2: null,
                },
                {
                    t1: "MIBR",
                    t2: "ENVY",
                    date: "Sáb 9 May",
                    s1: null,
                    s2: null,
                },
                {
                    t1: "Leviatán",
                    t2: "LOUD",
                    date: "Dom 10 May",
                    s1: null,
                    s2: null,
                },
            ];

            const omegaRemaining = [
                {
                    t1: "FURIA",
                    t2: "KRÜ Esports",
                    date: "Sáb 25 Abr",
                    s1: null,
                    s2: null,
                },
                {
                    t1: "NRG",
                    t2: "100 Thieves",
                    date: "Sáb 25 Abr",
                    s1: null,
                    s2: null,
                },
                {
                    t1: "Evil Geniuses",
                    t2: "Sentinels",
                    date: "Dom 26 Abr",
                    s1: null,
                    s2: null,
                },
                {
                    t1: "NRG",
                    t2: "Evil Geniuses",
                    date: "Vie 1 May",
                    s1: null,
                    s2: null,
                },
                {
                    t1: "100 Thieves",
                    t2: "KRÜ Esports",
                    date: "Sáb 2 May",
                    s1: null,
                    s2: null,
                },
                {
                    t1: "FURIA",
                    t2: "Sentinels",
                    date: "Sáb 2 May",
                    s1: null,
                    s2: null,
                },
                {
                    t1: "Evil Geniuses",
                    t2: "KRÜ Esports",
                    date: "Vie 8 May",
                    s1: null,
                    s2: null,
                },
                {
                    t1: "FURIA",
                    t2: "100 Thieves",
                    date: "Vie 8 May",
                    s1: null,
                    s2: null,
                },
                {
                    t1: "NRG",
                    t2: "Sentinels",
                    date: "Dom 10 May",
                    s1: null,
                    s2: null,
                },
            ];

            let probabilitiesCache = { alpha: null, omega: null };

            function getBaseStats(teams) {
                let stats = {};
                teams.forEach(
                    (t) =>
                        (stats[t] = {
                            name: t,
                            matchWins: 0,
                            matchLosses: 0,
                            mapWins: 0,
                            mapLosses: 0,
                        }),
                );
                return stats;
            }

            function applyMatch(stats, t1, t2, s1, s2) {
                stats[t1].mapWins += s1;
                stats[t1].mapLosses += s2;
                stats[t2].mapWins += s2;
                stats[t2].mapLosses += s1;
                if (s1 > s2) {
                    stats[t1].matchWins++;
                    stats[t2].matchLosses++;
                } else if (s2 > s1) {
                    stats[t2].matchWins++;
                    stats[t1].matchLosses++;
                }
            }

            function removeMatch(stats, t1, t2, s1, s2) {
                stats[t1].mapWins -= s1;
                stats[t1].mapLosses -= s2;
                stats[t2].mapWins -= s2;
                stats[t2].mapLosses -= s1;
                if (s1 > s2) {
                    stats[t1].matchWins--;
                    stats[t2].matchLosses--;
                } else if (s2 > s1) {
                    stats[t2].matchWins--;
                    stats[t1].matchLosses--;
                }
            }

            function sortStandings(statsArray) {
                return statsArray.sort((a, b) => {
                    if (b.matchWins !== a.matchWins)
                        return b.matchWins - a.matchWins;
                    const aMapDiff = a.mapWins - a.mapLosses;
                    const bMapDiff = b.mapWins - b.mapLosses;
                    if (bMapDiff !== aMapDiff) return bMapDiff - aMapDiff;
                    if (b.mapWins !== a.mapWins) return b.mapWins - a.mapWins;
                    return a.name.localeCompare(b.name);
                });
            }

            function calculateCurrentStandings(teams, played, pendingMatches) {
                let stats = getBaseStats(teams);
                played.forEach((m) =>
                    applyMatch(stats, m.t1, m.t2, m.s1, m.s2),
                );
                pendingMatches.forEach((m) => {
                    if (m.s1 !== null && m.s2 !== null)
                        applyMatch(stats, m.t1, m.t2, m.s1, m.s2);
                });
                return sortStandings(Object.values(stats));
            }

            function simulateProbabilities(teams, played, pendingMatches) {
                let stats = getBaseStats(teams);
                played.forEach((m) =>
                    applyMatch(stats, m.t1, m.t2, m.s1, m.s2),
                );

                let fixedRemaining = pendingMatches.filter(
                    (m) => m.s1 !== null && m.s2 !== null,
                );
                let pending = pendingMatches.filter(
                    (m) => m.s1 === null && m.s2 === null,
                );

                fixedRemaining.forEach((m) =>
                    applyMatch(stats, m.t1, m.t2, m.s1, m.s2),
                );

                let placementCounts = {};
                teams.forEach(
                    (t) =>
                        (placementCounts[t] = {
                            first: 0,
                            upper: 0,
                            lower: 0,
                            out: 0,
                        }),
                );

                const outcomes = [
                    [2, 0],
                    [2, 1],
                    [1, 2],
                    [0, 2],
                ];
                let totalPermutations = 0;

                function backtrack(index) {
                    if (index === pending.length) {
                        totalPermutations++;
                        let currentStandings = sortStandings(
                            Object.values(stats),
                        );

                        placementCounts[currentStandings[0].name].first++;
                        placementCounts[currentStandings[1].name].upper++;
                        placementCounts[currentStandings[2].name].upper++;
                        placementCounts[currentStandings[3].name].lower++;
                        placementCounts[currentStandings[4].name].out++;
                        placementCounts[currentStandings[5].name].out++;
                        return;
                    }

                    let match = pending[index];
                    for (let i = 0; i < outcomes.length; i++) {
                        let [s1, s2] = outcomes[i];
                        applyMatch(stats, match.t1, match.t2, s1, s2);
                        backtrack(index + 1);
                        removeMatch(stats, match.t1, match.t2, s1, s2);
                    }
                }

                if (pending.length > 0) backtrack(0);
                else {
                    totalPermutations = 1;
                    let currentStandings = sortStandings(Object.values(stats));
                    placementCounts[currentStandings[0].name].first++;
                    placementCounts[currentStandings[1].name].upper++;
                    placementCounts[currentStandings[2].name].upper++;
                    placementCounts[currentStandings[3].name].lower++;
                    placementCounts[currentStandings[4].name].out++;
                    placementCounts[currentStandings[5].name].out++;
                }

                let results = {};
                teams.forEach((t) => {
                    results[t] = {
                        first: {
                            percent: (
                                (placementCounts[t].first / totalPermutations) *
                                100
                            ).toFixed(1),
                            count: placementCounts[t].first,
                            total: totalPermutations,
                        },
                        upper: {
                            percent: (
                                (placementCounts[t].upper / totalPermutations) *
                                100
                            ).toFixed(1),
                            count: placementCounts[t].upper,
                            total: totalPermutations,
                        },
                        lower: {
                            percent: (
                                (placementCounts[t].lower / totalPermutations) *
                                100
                            ).toFixed(1),
                            count: placementCounts[t].lower,
                            total: totalPermutations,
                        },
                        out: {
                            percent: (
                                (placementCounts[t].out / totalPermutations) *
                                100
                            ).toFixed(1),
                            count: placementCounts[t].out,
                            total: totalPermutations,
                        },
                    };
                });
                return results;
            }

            function runProbabilities(group) {
                const btn = document.getElementById(`btn-${group}`);
                btn.innerText = "Calculando...";
                btn.disabled = true;

                setTimeout(() => {
                    if (group === "alpha") {
                        probabilitiesCache.alpha = simulateProbabilities(
                            alphaTeams,
                            alphaPlayed,
                            alphaRemaining,
                        );
                    } else {
                        probabilitiesCache.omega = simulateProbabilities(
                            omegaTeams,
                            omegaPlayed,
                            omegaRemaining,
                        );
                    }
                    renderTables();
                    btn.innerText = "Calcular Probabilidades";
                    btn.disabled = false;
                }, 50);
            }

            function formatProb(value) {
                if (!value) return "-";

                const percent = parseFloat(value.percent ?? value);
                const count = value.count ?? null;
                const total = value.total ?? null;

                let cls = "prob-zero";
                if (percent > 60) cls = "prob-high";
                else if (percent > 20) cls = "prob-med";
                else if (percent > 0) cls = "prob-low";

                if (count !== null && total !== null) {
                    return `<span class="prob-cell ${cls}">${percent}%<span class="prob-count">${count}/${total}</span></span>`;
                }
                return `<span class="prob-cell ${cls}">${percent}%</span>`;
            }

            function drawTable(tableId, standings, probs) {
                const tbody = document.querySelector(`#${tableId} tbody`);
                tbody.innerHTML = "";
                standings.forEach((team, index) => {
                    const tr = document.createElement("tr");

                    let rankClass = "";
                    if (index === 0) rankClass = "rank-1";
                    else if (index === 1 || index === 2) rankClass = "rank-2";
                    else if (index === 3) rankClass = "rank-4";
                    if (rankClass) tr.classList.add(rankClass);

                    const isKru = team.name === "KRÜ Esports";
                    let p = probs ? probs[team.name] : null;

                    // Añadimos de nuevo la columna de Mapas: ${team.mapWins} - ${team.mapLosses}
                    tr.innerHTML = `
                    <td>${index + 1}</td>
                    <td class="team-name ${isKru ? "kru-highlight" : ""}">${team.name}</td>
                    <td><b>${team.matchWins} - ${team.matchLosses}</b></td>
                    <td>${team.mapWins} - ${team.mapLosses}</td>
                    <td>${formatProb(p?.first)}</td>
                    <td>${formatProb(p?.upper)}</td>
                    <td>${formatProb(p?.lower)}</td>
                    <td>${formatProb(p?.out)}</td>
                `;
                    tbody.appendChild(tr);
                });
            }

            function renderTables() {
                const alphaStandings = calculateCurrentStandings(
                    alphaTeams,
                    alphaPlayed,
                    alphaRemaining,
                );
                const omegaStandings = calculateCurrentStandings(
                    omegaTeams,
                    omegaPlayed,
                    omegaRemaining,
                );

                drawTable(
                    "alpha-table",
                    alphaStandings,
                    probabilitiesCache.alpha,
                );
                drawTable(
                    "omega-table",
                    omegaStandings,
                    probabilitiesCache.omega,
                );
            }

            function renderGroupMatches(containerId, matches, groupName) {
                const container = document.getElementById(containerId);
                container.innerHTML = "";

                matches.forEach((match) => {
                    const div = document.createElement("div");
                    div.className = "match-row";

                    let teamsHtml =
                        match.t1 === "KRÜ Esports" || match.t2 === "KRÜ Esports"
                            ? match.t1.replace(
                                  "KRÜ Esports",
                                  "<span class='kru-highlight'>KRÜ Esports</span>",
                              ) +
                              " vs " +
                              match.t2.replace(
                                  "KRÜ Esports",
                                  "<span class='kru-highlight'>KRÜ Esports</span>",
                              )
                            : `${match.t1} vs ${match.t2}`;

                    const infoDiv = document.createElement("div");
                    infoDiv.className = "match-info";
                    infoDiv.innerHTML = `
                    <div class="match-date">${match.date}</div>
                    <div class="match-teams">${teamsHtml}</div>
                `;

                    const select = document.createElement("select");
                    select.innerHTML = `<option value="">Pendiente</option>
                                    <option value="2-0">2 - 0 (${match.t1})</option>
                                    <option value="2-1">2 - 1 (${match.t1})</option>
                                    <option value="1-2">1 - 2 (${match.t2})</option>
                                    <option value="0-2">0 - 2 (${match.t2})</option>`;

                    select.addEventListener("change", (e) => {
                        const val = e.target.value;
                        if (val) {
                            const scores = val.split("-");
                            match.s1 = parseInt(scores[0]);
                            match.s2 = parseInt(scores[1]);
                        } else {
                            match.s1 = null;
                            match.s2 = null;
                        }

                        if (groupName === "alpha")
                            probabilitiesCache.alpha = null;
                        if (groupName === "omega")
                            probabilitiesCache.omega = null;

                        renderTables();
                    });

                    div.appendChild(infoDiv);
                    div.appendChild(select);
                    container.appendChild(div);
                });
            }

            // Inicialización
            renderGroupMatches("alpha-matches", alphaRemaining, "alpha");
            renderGroupMatches("omega-matches", omegaRemaining, "omega");
            renderTables();
        </script>
    </body>
</html>
